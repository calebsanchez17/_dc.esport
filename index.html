<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC ESPORT | Professional Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div id="login-screen" class="login-container">
        <div class="login-overlay"></div>
        
        <div class="login-card">
            <div class="login-header">
                <img src="img/red.png" alt="Logo DC" class="login-logo-img">
                <h1>DC ESPORT</h1>
                <p>SISTEMA DE GESTIÓN PROFESIONAL</p>
            </div>

            <div class="login-body">
                <div class="input-group">
                    <label>USUARIO</label>
                    <input type="text" id="user" placeholder="DC ESPORT">
                </div>
                <div class="input-group">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="pass" placeholder="1234">
                </div>
                <button class="btn-login" onclick="intentarLogin()">
                    ACCEDER AL SISTEMA
                </button>
                <p id="error-msg" class="error-text"></p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
