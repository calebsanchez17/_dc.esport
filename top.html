        function procesarRanking() {
            const sumas = {};

            // Acumular datos de todos los años
            Object.keys(datosEsport).forEach(año => {
                datosEsport[año].forEach(j => {
                    if (!sumas[j.n]) {
                        sumas[j.n] = { nombre: j.n, kills: 0, mvp: 0, pais: j.p, foto: j.f };
                    }
                    sumas[j.n].kills += j.k;
                    sumas[j.n].mvp += j.m;
                });
            });

            // Convertir a array y ordenar por kills
            const ranking = Object.values(sumas).sort((a, b) => b.kills - a.kills);
            const top5 = ranking.slice(0, 5);

            // 1. Dibujar Podio (Top 3)
            const podiumArea = document.getElementById("podium-area");
            // Ordenamos visualmente: 2do - 1ro - 3ro
            const pOrder = [top5[1], top5[0], top5[2]];
            
            podiumArea.innerHTML = pOrder.map((j, i) => `
                <div class="podium-item rank-${i === 1 ? '1' : i === 0 ? '2' : '3'}">
                    <div class="rank-badge">${i === 1 ? '1' : i === 0 ? '2' : '3'}</div>
                    <img src="${j.foto}" onerror="this.src='img/default.png'">
                    <h4 style="font-size:12px;">${j.nombre}</h4>
                    <p style="color:gold; font-size:14px; font-weight:bold;">${j.kills} KILLS</p>
                </div>
            `).join('');

            // 2. Dibujar Tabla (Top 5 completo)
            const topBody = document.getElementById("top-body");
            topBody.innerHTML = top5.map((j, i) => `
                <tr>
                    <td style="color:#00aaff; font-weight:bold;">#${i + 1}</td>
                    <td>
                        <div class="player-flex">
                            <img src="${j.foto}" class="mini-pfp" onerror="this.src='img/default.png'">
                            <span>${j.nombre}</span>
                        </div>
                    </td>
                    <td>${j.pais}</td>
                    <td class="txt-kills">${j.kills}</td>
                    <td class="txt-mvp">${j.mvp}</td>
                </tr>
            `).join('');
        }

        document.addEventListener("DOMContentLoaded", procesarRanking);
