        function cargarContenido() {
            const grid = document.getElementById("grid-competitivo");
            let html = "";

            const años = Object.keys(datosEsport).sort((a, b) => b - a);

            años.forEach(año => {
                html += `<h2 class="temporada-header">SEASON ${año}</h2>`;
                
                // Ordenar jugadores por kills en cada temporada
                const jugadores = [...datosEsport[año]].sort((a,b) => b.k - a.k);

                jugadores.forEach((j, index) => {
                    let rating = Math.min(99, Math.round((j.k / 2.5) + (j.m * 5)));
                    let medal = index === 0 ? "🥇" : index === 1 ? "🥈" : index === 2 ? "🥉" : "";

                    html += `
                        <div class="player-card">
                            <div class="card-header">
                                <span class="rating">${rating}</span>
                                <span class="medal">${medal}</span>
                                <span class="flag">${j.p}</span>
                            </div>
                            <div class="img-wrapper">
                                <img src="${j.f}" onerror="this.src='img/default.png'">
                            </div>
                            <h3>${j.n}</h3>
                            <div class="stats-row">
                                <div class="stat-group">
                                    <span>KILLS</span>
                                    <strong>${j.k}</strong>
                                </div>
                                <div class="stat-group">
                                    <span>MVP</span>
                                    <strong>${j.m}</strong>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });
            grid.innerHTML = html;
        }
